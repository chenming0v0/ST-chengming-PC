<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>终端 - SillyTavern 启动器</title>
<link rel="stylesheet" href="../partials/app.css">
</head>
<body>
<div class="app">
<header class="titlebar"><div class="brand"><img class="titlebar-logo" src="../assets/chengming.png" alt="辰林">SillyTavern 启动器 1.0.0</div>
<div class="wc"><button type="button">?</button><button type="button">—</button><button type="button">□</button><button type="button" class="x">×</button></div></header>
<div class="row">
<aside class="sidebar">
<div class="sb-logo"><img src="../assets/chengming.png" alt="辰林"></div>
<button type="button" class="sb-nav" id="nav-launch" data-dom-id="nav-launch"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.14v13.72c0 .8.87 1.3 1.56.88l11.14-6.86c.66-.4.66-1.36 0-1.76L9.56 4.26A1.03 1.03 0 0 0 8 5.14Z"/></svg>启动</button>
<button type="button" class="sb-nav" id="nav-install" data-dom-id="nav-install"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M4 19h16"/></svg>安装</button>
<button type="button" class="sb-nav on" id="nav-terminal" data-dom-id="nav-terminal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m7 9 3 3-3 3"/><path d="M13 15h4"/></svg>终端</button>
<div class="sb-grow"></div>
<button type="button" class="sb-nav" id="nav-theme-toggle" title="夜间模式（原型）"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>夜间</button>
<button type="button" class="sb-nav" id="nav-settings" data-dom-id="nav-settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>设置</button>
</aside>
<main class="main"><div class="page">
<div class="toolbar"><h1 class="h1" style="margin:0">终端</h1><span class="badge"><span style="width:6px;height:6px;border-radius:50%;background:#22c55e"></span>运行中</span><span class="sp"></span>
<label style="font-size:12px;color:var(--muted)"><input type="checkbox" checked> 自动滚动</label>
<button class="btn">清空日志</button><button class="btn btn-r">停止服务</button></div>
<div class="term"><div class="term-h"><i style="background:#ef4444"></i><i style="background:#f59e0b"></i><i style="background:#22c55e"></i> SillyTavern — node server.js</div>
<div class="term-b">
<div class="c-cyan">&gt; node server.js --port 8000</div>
<div>[启动器] 正在启动 SillyTavern 服务…</div>
<div>[INFO] SillyTavern 1.13.4 release</div>
<div class="c-grn">[OK] ✓ 配置文件加载完成</div>
<div class="c-amb">[WARN] 未检测到 API 密钥，请在酒馆网页中配置 AI 后端连接</div>
<div class="c-grn">[OK] ✓ SillyTavern is listening on: http://127.0.0.1:8000</div>
<div>[启动器] 启动成功！已在默认浏览器中打开酒馆页面。</div>
</div></div></div></main>
</div>
</div>
</body>
</html>
