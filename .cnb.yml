release:
  push:
    - name: auto tag release
      stages:
        - name: generate semantic release tag
          image: cnbcool/git-auto-tag:latest
          settings:
            branch: release
            blockWhenFail: false
            toFile: auto_tag.json
          exports:
            tag: RELEASE_TAG
        - name: print tag result
          script: |
            echo "Generated tag: ${RELEASE_TAG}"
            test -f auto_tag.json && cat auto_tag.json || true
    - name: github windows build handoff
      stages:
        - name: explain artifact handoff
          script: |
            echo "Windows installers are built by GitHub Actions on windows-latest."
            echo "After the GitHub build finishes, it uploads the MSI/EXE artifacts to CNB release attachments."

"$":
  tag_push:
    - name: github windows release handoff
      stages:
        - name: explain tag release handoff
          script: |
            echo "Tag detected. GitHub Actions builds the Windows installer and syncs it back to CNB release attachments."
