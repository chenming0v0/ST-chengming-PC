release:
  push:
    - name: auto tag release
      stages:
        - name: generate semantic release tag
          image: cnbcool/git-auto-tag:latest
          settings:
            branch: release
            blockWhenFail: false
            toFile: auto_tag.json
          exports:
            tag: RELEASE_TAG
        - name: print tag result
          script: |
            echo "Generated tag: ${RELEASE_TAG}"
            test -f auto_tag.json && cat auto_tag.json || true

    - name: build tauri msi
      runner:
        namespace: group
        cpus: 2
        tags:
          - windows
      stages:
        - name: verify windows runner
          script: |
            ver
            systeminfo | findstr /B /C:"OS Name" /C:"OS Version"
            where msbuild
            powershell -Command "Get-ComputerInfo | Select-Object WindowsVersion, OsArchitecture"
        - name: prepare toolchain
          script: |
            rustup target add wasm32-unknown-unknown
            cargo install trunk --locked
            cargo install tauri-cli --version "^2.0" --locked
        - name: install node metadata
          script: npm ci
        - name: build msi
          script: cargo tauri build

"$":
  tag_push:
    - name: build tagged tauri msi
      runner:
        namespace: group
        cpus: 2
        tags:
          - windows
      stages:
        - name: verify windows runner
          script: |
            ver
            systeminfo | findstr /B /C:"OS Name" /C:"OS Version"
            where msbuild
            powershell -Command "Get-ComputerInfo | Select-Object WindowsVersion, OsArchitecture"
        - name: prepare toolchain
          script: |
            rustup target add wasm32-unknown-unknown
            cargo install trunk --locked
            cargo install tauri-cli --version "^2.0" --locked
        - name: install node metadata
          script: npm ci
        - name: build msi
          script: cargo tauri build
